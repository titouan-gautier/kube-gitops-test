image:
  repository: ghcr.io/titouan-gautier/kube-gitops-test
  tag: "a5db0996c0c857f6e7532a3e9d09301286e4189d"
  pullPolicy: IfNotPresent

replicaCount: 1
revisionHistoryLimit: 1

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

config:
  appVersion: "1.0.0"
  logLevel: "info"

ingress:
  enabled: false
  hostname: "mon-app.local"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPU: 70

# L'annotation clé pour Prometheus
prometheus:
  scrape: true
  port: 3000
  path: /metrics